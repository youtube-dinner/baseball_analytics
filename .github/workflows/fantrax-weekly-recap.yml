name: Fantrax Weekly Recap

on:
  workflow_dispatch:
  schedule:
    # Monday only. These two UTC slots cover 5:00 AM Central in both CDT and CST.
    - cron: "0 10,11 * * 1"

permissions:
  contents: write

concurrency:
  group: fantrax-weekly-recap
  cancel-in-progress: false

jobs:
  weekly-recap:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh Fantrax rosters
        env:
          FANTRAX_AUTH_COOKIE: ${{ secrets.FANTRAX_AUTH_COOKIE }}
        run: python outputs/fantrax_daily_export.py

      - name: Post weekly matchup recap
        env:
          FANTRAX_AUTH_COOKIE: ${{ secrets.FANTRAX_AUTH_COOKIE }}
          FANTRAX_LEAGUE_ID: ${{ secrets.FANTRAX_LEAGUE_ID }}
          GROUPME_BOT_ID: ${{ secrets.GROUPME_BOT_ID }}
          FANTRAX_WEEKLY_RECAP_HOUR: "5"
        run: python outputs/send_fantrax_weekly_recap.py --groupme

      - name: Commit weekly recap state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f outputs/fantrax_export/fantrax_weekly_recap_state.json ]; then
            echo "No weekly recap state file was written."
            exit 0
          fi
          git add outputs/fantrax_export/fantrax_weekly_recap_state.json
          if git diff --cached --quiet; then
            echo "No weekly recap state changes to commit."
          else
            git commit -m "Update Fantrax weekly recap state"
            git pull --rebase --autostash
            git push
          fi

      - name: Upload weekly recap artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fantrax-weekly-recap
          path: |
            outputs/fantrax_export/fantrax_weekly_recap_latest.csv
            outputs/fantrax_export/fantrax_weekly_recap_metadata_latest.json
            outputs/fantrax_export/fantrax_weekly_recap_state.json
