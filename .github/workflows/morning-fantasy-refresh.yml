name: Morning Fantasy Refresh

on:
  workflow_dispatch:
    inputs:
      probable_date_mode:
        description: "Probable starter date selection"
        required: true
        default: "auto"
  schedule:
    # 14:00 UTC = 9:00 AM America/Chicago during daylight time, 8:00 AM during standard time.
    - cron: "0 14 * * *"
    # 01:00 UTC = 8:00 PM America/Chicago during daylight time, 7:00 PM during standard time.
    - cron: "0 1 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: morning-fantasy-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pandas numpy

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run daily refresh and publish
        env:
          PYTHON: python
          NODE: node
          REFRESH_BUILD_WORKBOOK: "0"
          FANTRAX_AUTH_COOKIE: ${{ secrets.FANTRAX_AUTH_COOKIE }}
          FANTRAX_LEAGUE_ID: "qqll39pvmj90wrl1"
          FANTRAX_PROBABLE_MISC_DISPLAY_TYPE: "7"
          FANTRAX_TEAM_NAME: "Bobby and the NitWitts"
          FANTASY_BASEBALL_YEAR: "2026"
          FANTASY_BASEBALL_PREVIOUS_YEAR: "2025"
        run: >
          bash scripts/refresh_and_publish.sh
          --probable-date "${{ github.event.inputs.probable_date_mode || 'auto' }}"
          --publish

      - name: Upload refresh logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: morning-fantasy-refresh-logs
          path: |
            outputs/last_refresh_status.json
            outputs/refresh_logs/latest_refresh.log
